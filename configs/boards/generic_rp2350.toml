# Generic RP2350 board configuration

[board]
name = "Generic RP2350"
manufacturer = "Custom"

[cpu]
arch = "arm"           # Can be overridden to "hazard3"
core_count = 2
clock_hz = 150000000

[memory]
sram_size = 524288     # 520 KB
flash_size = 16777216  # 16 MB (typical external flash)

[gpio]
led_pin = 25           # Default, can be changed

[wlan]
enabled = false        # No wireless on generic board