# I2C EEPROM virtual device configuration

[device]
type = "i2c_eeprom"
name = "I2C EEPROM"

[connection]
i2c = 0                 # I2C block (0 or 1)
address = 0x50          # 7-bit I2C address

[eeprom]
size = 4096             # Size in bytes (4KB)
page_size = 16          # Page size for writes
write_delay_ms = 5      # Simulated write cycle time

[persistence]
save_file = ""          # Optional: path to save EEPROM contents